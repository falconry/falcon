# Build wheels using cibuildwheel (https://cibuildwheel.pypa.io/)
name: build-wheels

on:
  # Run when a release has been created
  release:
    types: [created]

  # NOTE(vytas): Also allow to release to Test PyPi manually.
  workflow_dispatch:

jobs:
  build-sdist:
    # NOTE(vytas): We actually build sdist and pure-Python wheel.
    name: sdist
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build sdist and pure-Python wheel
        env:
          FALCON_DISABLE_CYTHON: "Y"
        run: |
          pip install --upgrade pip
          pip install --upgrade build
          python -m build

      - name: Check built artifacts
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          tools/check_dist.py -e $GITHUB_EVENT_NAME -r $GITHUB_REF

      - name: Test sdist
        run: |
          tools/test_dist.py dist/*.tar.gz

      - name: Test pure-Python wheel
        run: |
          tools/test_dist.py dist/*.whl

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cibw-sdist
          path: dist/falcon-*

  upload-sdist:
    name: upload-sdist
    needs:
      - build-sdist
    runs-on: ubuntu-latest

    permissions:
      # NOTE(vytas): The 'contents' permission is needed for writing release assets.
      #   The default permissions seem to suffice, but we specify for clarity.
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cibw-sdist
          path: dist

      - name: Check collected artifacts
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          tools/check_dist.py -e $GITHUB_EVENT_NAME -r $GITHUB_REF

      - name: Upload sdist to release
        uses: AButler/upload-release-assets@34491005a5d7ec239a784e460807ce844fde7962 # v4.0.0
        if: github.event_name == 'release'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          files: 'dist/*.tar.gz'

  publish-sdist:
    name: publish-sdist
    needs:
      - upload-sdist
    runs-on: ubuntu-latest

    permissions:
      # NOTE(vytas): This permission is mandatory for Trusted Publishing.
      id-token: write

    # APPSEC(vytas): By using as few third-party actions as possible,
    #   this job reduces its attack vector, and minimizes the risk of
    #   unauthorized access to the GitHub-backed trusted identity.
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cibw-sdist
          path: dist

      # NOTE(vytas): Normally, invoking pypi-publish more than once in the
      #   same job is not considered supported, however, the two steps below
      #   are made mutually exclusive by the github.event_name condition.
      - name: Publish sdist and pure-Python wheel to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        if: github.event_name == 'workflow_dispatch'
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish sdist and pure-Python wheel to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        if: github.event_name == 'release'

  build-wheels:
    name: ${{ matrix.python }}-${{ matrix.platform.name }}
    needs: build-sdist
    permissions:
      contents: read
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: manylinux_x86_64
            os: ubuntu-latest
          - name: musllinux_x86_64
            os: ubuntu-latest
          - name: manylinux_aarch64
            os: ubuntu-24.04-arm
          - name: musllinux_aarch64
            os: ubuntu-24.04-arm
          - name: manylinux_s390x
            os: ubuntu-latest
            emulation: true
          - name: macosx_arm64
            os: macos-15
          - name: win_amd64
            os: windows-latest
        python:
          - cp310
          - cp311
          - cp312
          - cp313
          - cp314
        include:
          - platform:
              name: manylinux_x86_64
              os: ubuntu-latest
            python: cp314t
          - platform:
              name: musllinux_x86_64
              os: ubuntu-latest
            python: cp314t
          - platform:
              name: manylinux_aarch64
              os: ubuntu-24.04-arm
            python: cp314t
          - platform:
              name: musllinux_aarch64
              os: ubuntu-24.04-arm
            python: cp314t

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        if: ${{ matrix.platform.emulation }}
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@f03ac7617d6cff873ccf24cc0d567ef5ba5a9e6d # v4.0.0
        env:
          # NOTE(vytas): Uncomment to test against alpha/beta CPython
          #   (usually May-July until rc1).
          # CIBW_ENABLE: cpython-prerelease

          CIBW_ARCHS_LINUX: all
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.platform.name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cibw-wheel-${{ matrix.python }}-${{ matrix.platform.name }}
          path: wheelhouse/falcon-*.whl

  check-wheels:
    name: check-wheels
    needs:
      - build-wheels
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-wheel-*
          path: dist
          merge-multiple: true

      - name: Check collected artifacts
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          tools/check_dist.py -e $GITHUB_EVENT_NAME -r $GITHUB_REF

  publish-wheels:
    name: publish-wheels
    needs:
      - check-wheels
      - publish-sdist
    runs-on: ubuntu-latest

    permissions:
      # NOTE(vytas): This permission is mandatory for Trusted Publishing.
      id-token: write

    # APPSEC(vytas): By using as few third-party actions as possible,
    #   this job reduces its attack vector, and minimizes the risk of
    #   unauthorized access to the GitHub-backed trusted identity.
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-wheel-*
          path: dist
          merge-multiple: true

      # NOTE(vytas): Normally, invoking pypi-publish more than once in the
      #   same job is not considered supported, however, the two steps below
      #   are made mutually exclusive by the github.event_name condition.
      - name: Publish binary wheels to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        if: github.event_name == 'workflow_dispatch'
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish binary wheels to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        if: github.event_name == 'release'
