name: test-tox-sdist

on:
  # Trigger the workflow on master but also allow it to run manually.
  workflow_dispatch:
  push:
    branches:
      - master
  # TODO(vytas): Remove once proven to pass on PR.
  pull_request:
    branches:
      - master

jobs:
  run_tox:
    name: tox (python${{ matrix.python-version }})
    permissions:
      contents: read
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.15"

    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version != '3.15' && matrix.python-version || '3.15.0-beta.3 - 3.15.0'}}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U setuptools tox wheel
          python --version
          pip --version
          tox --version

      - name: Adjust .coveragerc
        run: |
          tools/sed_coverage_rc.py

      - name: Run tox inside sdist
        run: |
          tools/tox_sdist.py
